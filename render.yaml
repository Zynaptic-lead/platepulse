services:
  - type: web
    name: platepulse-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: platepulse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://platepulse-frontend.onrender.com
    autoDeploy: true
    healthCheckPath: /api/health

databases:
  - name: platepulse-db
    databaseName: platepulse
    user: platepulse_user
    plan: free